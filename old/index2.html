<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Background</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="/_sdk/element_sdk.js"></script>

  <style>
    * { font-family: 'Outfit', sans-serif; }
    
    @keyframes float {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50%      { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)); }
    }
    
    @keyframes gradient-shift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .float-animation {
      animation: float var(--duration) ease-in-out infinite;
      will-change: transform;
    }
    
    .gradient-bg-dark {
      background: linear-gradient(-45deg, #0f0f2f, #1e1a3a, #1a2545, #0f0f2f);
      background-size: 400% 400%;
      animation: gradient-shift 15s ease infinite;
    }
    
    .gradient-bg-light {
      background: linear-gradient(-45deg, #f0f4ff, #e5e7ff, #f3e8ff, #f0f4ff);
      background-size: 400% 400%;
      animation: gradient-shift 15s ease infinite;
    }
    
    .glass-card-dark {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    
    .glass-card-light {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(200, 200, 255, 0.25);
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
</head>

<body class="h-full text-white overflow-auto transition-colors duration-300">
  <div class="w-full h-full min-h-full flex flex-col">

    <!-- Floating Background Elements – exactly 5, very different sizes & speeds -->
    <div id="bg-container" class="fixed inset-0 overflow-hidden pointer-events-none gradient-bg-dark">

      <!-- 1. Very large & very slow -->
      <div class="absolute -top-40 -left-60 w-[52rem] h-[52rem] bg-violet-700/18 rounded-full blur-[140px] float-animation"
           style="--tx: 180px; --ty: -120px; --rot: 4deg; --duration: 38s; animation-delay: -8s;"></div>

      <!-- 2. Large & medium-slow -->
      <div class="absolute bottom-[-20%] right-[-15%] w-[38rem] h-[38rem] bg-cyan-600/20 rounded-full blur-[110px] float-animation"
           style="--tx: -160px; --ty: 140px; --rot: -5deg; --duration: 26s; animation-delay: -5s;"></div>

      <!-- 3. Medium size & moderate speed -->
      <div class="absolute top-[12%] left-[55%] w-[26rem] h-[26rem] bg-indigo-600/28 rounded-full blur-3xl float-animation"
           style="--tx: -110px; --ty: 90px; --rot: 6deg; --duration: 14s; animation-delay: -2s;"></div>

      <!-- 4. Smaller & faster -->
      <div class="absolute bottom-[18%] left-[8%] w-[18rem] h-[18rem] bg-purple-500/30 rounded-full blur-[60px] float-animation"
           style="--tx: 140px; --ty: -80px; --rot: -7deg; --duration: 9.5s; animation-delay: -1.2s;"></div>

      <!-- 5. Smallest & fastest -->
      <div class="absolute top-[38%] right-[10%] w-[13rem] h-[13rem] bg-blue-400/35 rounded-full blur-2xl float-animation"
           style="--tx: 80px; --ty: -70px; --rot: 9deg; --duration: 6.2s; animation-delay: -0.6s;"></div>

    </div>

    <!-- Header with Theme Toggle -->
    <header class="relative z-10 px-6 lg:px-12 py-6 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-violet-600 to-cyan-500 flex items-center justify-center">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
        </div>
        <span class="text-xl font-bold">Brand</span>
      </div>

      <!-- Theme Toggle Button -->
      <button id="theme-toggle" class="relative z-10 w-12 h-12 rounded-xl glass-card-dark flex items-center justify-center hover:bg-white/10 transition-all duration-300">
        <svg id="sun-icon" class="w-6 h-6 text-yellow-400" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.591a.75.75 0 101.06 1.06l1.591-1.591zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.591-1.591a.75.75 0 10-1.06 1.06l1.591 1.591zM12 18a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V18.75a.75.75 0 01.75-.75zM7.591 17.409a.75.75 0 10-1.06 1.06l1.591 1.591a.75.75 0 101.06-1.06l-1.591-1.591zM5.25 12a.75.75 0 01-.75-.75V8.25a.75.75 0 011.5 0v2.25a.75.75 0 01-.75.75zM6.166 6.166a.75.75 0 001.06-1.06L5.635 3.515a.75.75 0 00-1.06 1.06l1.591 1.591z" />
        </svg>
        <svg id="moon-icon" class="w-6 h-6 text-blue-400 hidden" fill="currentColor" viewBox="0 0 24 24">
          <path d="M21.752 15.002A9.718 9.718 0 0118.093 19.5c-5.385 0-9.75-4.365-9.75-9.75 0-4.247 2.991-7.85 7.073-8.929a.75.75 0 00.227-1.468A11.25 11.25 0 0012 0C6.477 0 2.25 4.227 2.25 9.75c0 5.523 4.227 9.75 9.75 9.75 2.06 0 4.006-.607 5.752-1.748.283-.148.456-.465.456-.78A.75.75 0 0021.752 15.002z" />
        </svg>
      </button>
    </header>

    <!-- CTA Section - Full Height -->
    <section class="relative z-10 flex-1 flex items-center justify-center px-6 lg:px-12 py-20">
      <div class="max-w-4xl mx-auto w-full">
        <div id="cta-card" class="glass-card-dark rounded-3xl p-8 lg:p-16 text-center relative overflow-hidden">
          <div class="absolute inset-0 bg-gradient-to-r from-violet-600/8 to-cyan-500/8"></div>
          <div class="relative">
            <h2 id="cta-heading" class="text-3xl lg:text-5xl font-bold mb-6">Ready to Get Started?</h2>
            <p id="cta-description" class="text-gray-400 mb-8 max-w-xl mx-auto text-lg">
              Join thousands of users experiencing the future today. Transform your workflow with our platform.
            </p>
            <div class="flex flex-wrap justify-center gap-4">
              <button id="primary-btn" class="px-8 py-3 lg:px-10 lg:py-4 bg-gradient-to-r from-violet-600 to-cyan-500 rounded-lg text-white font-semibold hover:opacity-90 transition-opacity">
                Get Started Now
              </button>
              <button id="secondary-btn" class="px-8 py-3 lg:px-10 lg:py-4 glass-card-dark rounded-lg text-white font-semibold hover:bg-white/20 transition-all border border-white/20">
                Learn More
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>

  </div>

  <script>
    // ────────────────────────────────────────────────
    //  The rest of your original script remains unchanged
    // ────────────────────────────────────────────────

    const defaultConfig = {
      cta_heading: 'Ready to Get Started?',
      cta_description: 'Join thousands of users experiencing the future today. Transform your workflow with our platform.',
      primary_button_text: 'Get Started Now',
      secondary_button_text: 'Learn More',
      isDark: true
    };

    let config = { ...defaultConfig };
    let isDarkMode = true;

    const themeToggle = document.getElementById('theme-toggle');
    const bgContainer  = document.getElementById('bg-container');
    const ctaCard      = document.getElementById('cta-card');
    const sunIcon      = document.getElementById('sun-icon');
    const moonIcon     = document.getElementById('moon-icon');

    function updateTheme(isDark) {
      isDarkMode = isDark;
      const body = document.body;
      
      if (isDark) {
        bgContainer.className = 'fixed inset-0 overflow-hidden pointer-events-none gradient-bg-dark';
        body.classList.remove('text-gray-900', 'bg-gray-50');
        body.classList.add('text-white');
        ctaCard.className = 'glass-card-dark rounded-3xl p-8 lg:p-16 text-center relative overflow-hidden';
        themeToggle.className = 'relative z-10 w-12 h-12 rounded-xl glass-card-dark flex items-center justify-center hover:bg-white/10 transition-all duration-300';
        
        sunIcon.classList.add('hidden');
        moonIcon.classList.remove('hidden');
        
        document.querySelectorAll('#cta-heading, #cta-description').forEach(el => {
          el.classList.remove('text-gray-900');
          el.classList.add('text-white', 'text-gray-400');
        });
      } else {
        bgContainer.className = 'fixed inset-0 overflow-hidden pointer-events-none gradient-bg-light';
        body.classList.add('text-gray-900');
        body.classList.remove('text-white');
        ctaCard.className = 'glass-card-light rounded-3xl p-8 lg:p-16 text-center relative overflow-hidden';
        themeToggle.className = 'relative z-10 w-12 h-12 rounded-xl glass-card-light flex items-center justify-center hover:bg-black/10 transition-all duration-300';
        
        sunIcon.classList.remove('hidden');
        moonIcon.classList.add('hidden');
        
        document.getElementById('cta-heading').classList.remove('text-white');
        document.getElementById('cta-heading').classList.add('text-gray-900');
        document.getElementById('cta-description').classList.remove('text-gray-400');
        document.getElementById('cta-description').classList.add('text-gray-600');
      }
      
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    themeToggle.addEventListener('click', () => {
      updateTheme(!isDarkMode);
    });

    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
      updateTheme(false);
    } else {
      updateTheme(true);
    }

    async function onConfigChange(config) {
      document.getElementById('cta-heading').textContent     = config.cta_heading          || defaultConfig.cta_heading;
      document.getElementById('cta-description').textContent = config.cta_description      || defaultConfig.cta_description;
      document.getElementById('primary-btn').textContent     = config.primary_button_text  || defaultConfig.primary_button_text;
      document.getElementById('secondary-btn').textContent   = config.secondary_button_text|| defaultConfig.secondary_button_text;
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ['cta_heading',          config.cta_heading          || defaultConfig.cta_heading],
        ['cta_description',      config.cta_description      || defaultConfig.cta_description],
        ['primary_button_text',  config.primary_button_text  || defaultConfig.primary_button_text],
        ['secondary_button_text',config.secondary_button_text|| defaultConfig.secondary_button_text]
      ]);
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }
  </script>

</html>
