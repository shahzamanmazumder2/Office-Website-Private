<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feature Navigation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            color: white;
            text-align: center;
        }

        h1 {
            padding: 40px 0 20px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 40px;
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card h2 {
            margin-bottom: 15px;
        }

        .card a {
            display: inline-block;
            padding: 10px 20px;
            background: #4e73df;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
        }

        .card a:hover {
            background: #2e59d9;
        }
    </style>
</head>
<body>

    <h1>Feature Pages Navigation</h1>

    <div class="container">
        <div class="card">
            <h2>Page 1</h2>
            <p>This is feature page one.</p>
            <a href="index1.html">Open Page 1</a>
        </div>

        <div class="card">
            <h2>Page 2</h2>
            <p>This is feature page two.</p>
            <a href="index2.html">Open Page 2</a>
        </div>

        <div class="card">
            <h2>Page 3</h2>
            <p>This is feature page three.</p>
            <a href="index3.html">Open Page 3</a>
        </div>

        <div class="card">
            <h2>Page 4</h2>
            <p>This is feature page four.</p>
            <a href="index4.html">Open Page 4</a>
        </div>

        <div class="card">
            <h2>Page 5</h2>
            <p>This is feature page five.</p>
            <a href="index5.html">Open Page 5</a>
        </div>
    </div>
    
    <h1>Testing pagegi</h1>

</body>
</html>
