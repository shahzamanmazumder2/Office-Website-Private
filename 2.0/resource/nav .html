<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rotating Background + Active Navbar</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #000;
    }

    .gradient-bg {
      background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #0d0d1f 100%);
      position: relative;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    .hero-gradient {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      z-index: 1;
      transition: opacity 5s ease-in-out;
      opacity: 0.58;
    }

    .tech-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image:
        linear-gradient(0deg,  transparent 24%, rgba(59,130,246,0.05) 25%, rgba(59,130,246,0.05) 26%, transparent 27%, transparent 74%, rgba(59,130,246,0.05) 75%, rgba(59,130,246,0.05) 76%, transparent 77%, transparent),
        linear-gradient(90deg, transparent 24%, rgba(59,130,246,0.05) 25%, rgba(59,130,246,0.05) 26%, transparent 27%, transparent 74%, rgba(59,130,246,0.05) 75%, rgba(59,130,246,0.05) 76%, transparent 77%, transparent);
      background-size: 50px 50px;
      z-index: 2;
      pointer-events: none;
    }

    .glow-text {
      text-shadow: 0 0 80px rgba(59, 130, 246, 0.6);
    }

    .btn-glow {
      box-shadow: 0 0 30px rgba(59, 130, 246, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .btn-glow:hover {
      box-shadow: 0 0 50px rgba(59, 130, 246, 0.6), inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .nav-link {
      position: relative;
      transition: color 0.2s;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      transition: width 0.3s ease;
    }

    .nav-link.active::after,
    .nav-link:hover::after {
      width: 100%;
    }

    .nav-link.active {
      color: white !important;
      font-weight: 600;
    }

    .content-wrapper {
      position: relative;
      z-index: 10;
    }
  </style>
</head>
<body class="h-full">

  <div class="gradient-bg">
    <div class="hero-gradient"></div>
    <div class="tech-pattern"></div>

    <!-- Navbar with active state support -->
    <div class="content-wrapper">
      <nav class="relative">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div class="flex items-center justify-between h-20">
            <!-- Logo -->
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center shadow-lg">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
              </div>
              <span class="text-white font-bold text-xl tracking-tight">CCAI</span>
            </div>

            <!-- Desktop Nav - with data-page for active tracking -->
            <div class="hidden md:flex items-center gap-8">
              <a href="#home" class="nav-link text-gray-300 hover:text-white transition-colors text-sm font-medium active" data-page="home">Home</a>
              <a href="#solutions" class="nav-link text-gray-300 hover:text-white transition-colors text-sm font-medium" data-page="solutions">Solutions</a>
              <a href="#platform" class="nav-link text-gray-300 hover:text-white transition-colors text-sm font-medium" data-page="platform">Platform</a>
              <a href="#resources" class="nav-link text-gray-300 hover:text-white transition-colors text-sm font-medium" data-page="resources">Resources</a>
              <a href="#enterprise" class="nav-link text-gray-300 hover:text-white transition-colors text-sm font-medium" data-page="enterprise">Enterprise</a>
            </div>

            <!-- CTA -->
            <div class="hidden md:flex items-center gap-4">
              <button class="text-gray-300 hover:text-white transition-colors text-sm font-medium">Sign In</button>
              <button class="px-5 py-2.5 bg-gradient-to-r from-blue-600 to-purple-600 text-white text-sm font-bold rounded-xl hover:from-blue-500 hover:to-purple-500 transition-all duration-300 btn-glow">
                Start Free Trial
              </button>
            </div>

            <!-- Mobile Menu Button -->
            <button id="mobile-menu-btn" class="md:hidden text-gray-300 hover:text-white p-2">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path id="menu-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
              </svg>
            </button>
          </div>

          <!-- Mobile Menu - also supports active state -->
          <div id="mobile-menu" class="hidden md:hidden glass rounded-2xl mt-2 p-4">
            <div class="flex flex-col gap-4">
              <a href="#home" class="nav-link text-gray-300 hover:text-white transition-colors text-sm font-medium py-2 active" data-page="home">Home</a>
              <a href="#solutions" class="nav-link text-gray-300 hover:text-white transition-colors text-sm font-medium py-2" data-page="solutions">Solutions</a>
              <a href="#platform" class="nav-link text-gray-300 hover:text-white transition-colors text-sm font-medium py-2" data-page="platform">Platform</a>
              <a href="#resources" class="nav-link text-gray-300 hover:text-white transition-colors text-sm font-medium py-2" data-page="resources">Resources</a>
              <a href="#enterprise" class="nav-link text-gray-300 hover:text-white transition-colors text-sm font-medium py-2" data-page="enterprise">Enterprise</a>
              <hr class="border-white/10">
              <button class="text-gray-300 hover:text-white transition-colors text-sm font-medium py-2 text-left">Sign In</button>
              <button class="px-5 py-3 bg-gradient-to-r from-blue-600 to-purple-600 text-white text-sm font-bold rounded-xl hover:from-blue-500 hover:to-purple-500 transition-all duration-300">
                Start Free Trial
              </button>
            </div>
          </div>
        </div>
      </nav>
    </div>
  </div>

  <script>
    // ───────────────────────────────────────────────
    //   Mobile menu toggle
    // ───────────────────────────────────────────────
    const mobileMenuBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    const menuIcon = document.getElementById('menu-icon');
    let isMenuOpen = false;

    mobileMenuBtn.addEventListener('click', () => {
      isMenuOpen = !isMenuOpen;
      mobileMenu.classList.toggle('hidden');
      menuIcon.setAttribute('d', isMenuOpen
        ? 'M6 18L18 6M6 6l12 12'
        : 'M4 6h16M4 12h16M4 18h16'
      );
    });

    // ───────────────────────────────────────────────
    //   Active Navigation Highlight
    // ───────────────────────────────────────────────
    const navLinks = document.querySelectorAll('.nav-link[data-page]');

    function setActivePage(pageName) {
      navLinks.forEach(link => {
        if (link.getAttribute('data-page') === pageName) {
          link.classList.add('active');
        } else {
          link.classList.remove('active');
        }
      });
    }

    // Click handler
    navLinks.forEach(link => {
      link.addEventListener('click', (e) => {
        // Uncomment next line if you want to prevent hash change / page jump
        // e.preventDefault();

        const page = link.getAttribute('data-page');
        setActivePage(page);

        // Close mobile menu after click
        if (isMenuOpen) {
          isMenuOpen = false;
          mobileMenu.classList.add('hidden');
          menuIcon.setAttribute('d', 'M4 6h16M4 12h16M4 18h16');
        }
      });
    });

    // Support URL hash (e.g. example.com#solutions)
    function handleHashChange() {
      const hash = window.location.hash.replace('#', '') || 'home';
      setActivePage(hash);
    }

    window.addEventListener('hashchange', handleHashChange);
    // Initial load
    handleHashChange();

    // ───────────────────────────────────────────────
    //   Rotating background (10s change + 5s fade)
    // ───────────────────────────────────────────────
    const backgrounds = [
      'linear-gradient(135deg, rgba(10,14,39,0.7) 0%, rgba(26,26,62,0.7) 50%, rgba(13,13,31,0.7) 100%), url("https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1600&q=80")',
      'linear-gradient(135deg, rgba(10,14,39,0.7) 0%, rgba(26,26,62,0.7) 50%, rgba(13,13,31,0.7) 100%), url("https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=1600&q=80")',
      'linear-gradient(135deg, rgba(10,14,39,0.7) 0%, rgba(26,26,62,0.7) 50%, rgba(13,13,31,0.7) 100%), url("https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=1600&q=80")',
      'linear-gradient(135deg, rgba(10,14,39,0.7) 0%, rgba(26,26,62,0.7) 50%, rgba(13,13,31,0.7) 100%), url("https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=1600&q=80")',
      'linear-gradient(135deg, rgba(10,14,39,0.7) 0%, rgba(26,26,62,0.7) 50%, rgba(13,13,31,0.7) 100%), url("https://images.unsplash.com/photo-1556075798-4825dfaaf498?w=1600&q=80")',
      'linear-gradient(135deg, rgba(10,14,39,0.7) 0%, rgba(26,26,62,0.7) 50%, rgba(13,13,31,0.7) 100%), url("https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1600&q=80")'
    ];

    let idx = 0;

    const layerA = document.createElement('div');
    const layerB = document.createElement('div');

    layerA.className = layerB.className = 'hero-gradient';
    layerA.style.opacity = '1';
    layerB.style.opacity = '0';

    const placeholder = document.querySelector('.hero-gradient');
    const container = placeholder.parentElement;

    layerA.style.backgroundImage = backgrounds[0];
    layerB.style.backgroundImage = backgrounds[1];

    container.insertBefore(layerA, placeholder);
    container.insertBefore(layerB, placeholder);
    placeholder.remove();

    setInterval(() => {
      idx = (idx + 1) % backgrounds.length;

      const active = parseFloat(layerA.style.opacity) > 0.5 ? layerA : layerB;
      const next   = active === layerA ? layerB : layerA;

      next.style.backgroundImage = backgrounds[idx];
      next.style.transition = active.style.transition = 'opacity 5s ease-in-out';

      next.style.opacity = '1';
      active.style.opacity = '0';
    }, 10000);
  </script>

</body>
</html>
